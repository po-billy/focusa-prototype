<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>주문내역 — 뉴스247</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #0f172a; min-height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif; background: #f5f5f5; max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }

    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
    .header .back { font-size: 20px; color: #333; text-decoration: none; }
    .header h1 { font-size: 17px; font-weight: 600; }
    .header .space { width: 24px; }

    /* Status tabs */
    .tab-bar { display: flex; background: #fff; border-bottom: 1px solid #eee; overflow-x: auto; scrollbar-width: none; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab { padding: 12px 16px; font-size: 14px; color: #999; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab.active { color: rgb(49, 130, 246); font-weight: 700; border-bottom-color: rgb(49, 130, 246); }

    /* Order cards */
    .list { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
    .order-card { background: #fff; border-radius: 14px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); cursor: pointer; transition: transform 0.1s; }
    .order-card:active { transform: scale(0.98); }
    .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .order-id { font-size: 12px; color: #aaa; }
    .badge-status { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .badge-status.waiting { background: #fff3cd; color: #856404; }
    .badge-status.review { background: #f0e6ff; color: #5b21b6; }
    .badge-status.progress { background: #cff4fc; color: #055160; }
    .badge-status.done { background: #d1e7dd; color: #0a3622; }
    .order-type { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .order-meta { font-size: 13px; color: #888; display: flex; gap: 8px; }
    .order-meta span { display: flex; align-items: center; gap: 3px; }
    .order-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f5f5f5; }
    .order-price { font-size: 16px; font-weight: 800; color: #1a1a2e; }
    .order-action { font-size: 13px; color: #1a1a2e; font-weight: 600; display: flex; align-items: center; gap: 4px; }

    /* Manuscript preview */
    .manuscript-badge { background: #f0e6ff; border-radius: 8px; padding: 8px 10px; margin-top: 10px; font-size: 12px; color: #5b21b6; display: flex; align-items: center; gap: 6px; }

    /* Media chips */
    .media-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .media-chip { font-size: 11px; background: #f0f4ff; color: #1a1a2e; padding: 3px 8px; border-radius: 20px; }

    /* Empty state */
    .empty { text-align: center; padding: 60px 20px; color: #bbb; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-text { font-size: 15px; margin-bottom: 6px; color: #999; }
    .empty-sub { font-size: 13px; }
    .empty-btn { margin-top: 20px; background: rgb(49, 130, 246); color: #fff; border: none; border-radius: 12px; padding: 14px 24px; font-size: 15px; font-weight: 700; cursor: pointer; }

    /* Bottom nav */
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; border-top: 1px solid #eee; display: flex; z-index: 50; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0 8px; cursor: pointer; text-decoration: none; color: #c0c0c0; transition: color 0.15s; }
    .nav-item.active { color: rgb(49, 130, 246); }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-label { font-size: 10px; margin-top: 3px; font-weight: 500; }
  </style>
</head>
<body>

<div class="header">
  <a class="back" href="dashboard.html">←</a>
  <h1>주문내역</h1>
  <div class="space"></div>
</div>

<div class="tab-bar">
  <div class="tab active" onclick="filterStatus('all',this)">전체</div>
  <div class="tab" onclick="filterStatus('waiting',this)">입금 대기</div>
  <div class="tab" onclick="filterStatus('review',this)">검토중</div>
  <div class="tab" onclick="filterStatus('progress',this)">배포중</div>
  <div class="tab" onclick="filterStatus('done',this)">완료</div>
</div>

<div class="list" id="orderList"></div>

<nav class="bottom-nav">
  <a class="nav-item" href="dashboard.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9,22 9,12 15,12 15,22"/>
    </svg>
    <div class="nav-label">홈</div>
  </a>
  <a class="nav-item active" href="orders.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14,2 14,8 20,8"/>
      <line x1="9" y1="13" x2="15" y2="13"/>
      <line x1="9" y1="17" x2="13" y2="17"/>
    </svg>
    <div class="nav-label">주문내역</div>
  </a>
  <a class="nav-item" href="#">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <div class="nav-label">문의</div>
  </a>
  <a class="nav-item" href="#">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="20" x2="18" y2="10"/>
      <line x1="12" y1="20" x2="12" y2="4"/>
      <line x1="6" y1="20" x2="6" y2="14"/>
    </svg>
    <div class="nav-label">리포트</div>
  </a>
  <a class="nav-item" href="#">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
    <div class="nav-label">설정</div>
  </a>
</nav>

<script>
const statusMap = {
  waiting:  { label: '입금 대기',  cls: 'waiting' },
  review:   { label: '원고 검토중', cls: 'review' },
  progress: { label: '배포 진행중', cls: 'progress' },
  done:     { label: '배포 완료',  cls: 'done' },
};

const actionMap = {
  waiting:  '입금 확인 요청 →',
  review:   '원고 확인 →',
  progress: '진행 현황 →',
  done:     '리포트 보기 →',
};

let allOrders = JSON.parse(localStorage.getItem('focusa_orders') || '[]');
let currentFilter = 'all';

// 샘플 데이터 (없을 때)
if(allOrders.length === 0) {
  // 샘플 보여주고 싶으면 아래 주석 해제
  // allOrders = [
  //   { id:'ORD-1748000001', type:'domestic', mediaCount:4, total:272000, date:'2026.03.30', status:'review', items:[{name:'공감신문'},{name:'직썰'},{name:'울산제일일보'},{name:'내의경제TV'}], manuscript:{mode:'ai',title:'뉴스247, 국내 보도자료 배포 서비스 정식 출시'} },
  //   { id:'ORD-1748000002', type:'overseas', mediaCount:1, total:350000, date:'2026.03.28', status:'done', items:[{name:'미국 스탠다드'}], manuscript:{mode:'direct',title:'뉴스247 Launches Press Release Distribution Service'} },
  // ];
}

function render(orders) {
  const list = document.getElementById('orderList');
  if(orders.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <div class="empty-text">주문 내역이 없습니다</div>
        <div class="empty-sub">첫 보도자료를 배포해보세요</div>
        <button class="empty-btn" onclick="window.location.href='dashboard.html'">배포 시작하기</button>
      </div>`;
    return;
  }
  list.innerHTML = orders.map(o => {
    const st = statusMap[o.status] || statusMap.waiting;
    const act = actionMap[o.status] || '확인하기 →';
    const chips = (o.items || []).slice(0,3).map(m=>`<span class="media-chip">${m.name}</span>`).join('')
      + (o.items && o.items.length > 3 ? `<span class="media-chip">+${o.items.length-3}</span>` : '');
    const msBadge = o.manuscript
      ? `<div class="manuscript-badge">✨ ${o.manuscript.mode === 'ai' ? 'AI 원고' : '직접 작성'}: ${o.manuscript.title || '원고 제출 완료'}</div>`
      : '';
    return `
      <div class="order-card" onclick="openOrder('${o.id}')">
        <div class="order-top">
          <div class="order-id">${o.id}</div>
          <div class="badge-status ${st.cls}">${st.label}</div>
        </div>
        <div class="order-type">${o.type === 'domestic' ? '📰 국내 배포' : '🌏 해외 배포'}</div>
        <div class="order-meta">
          <span>📅 ${o.date}</span>
          <span>📺 ${o.mediaCount}개 매체</span>
        </div>
        ${chips ? `<div class="media-chips">${chips}</div>` : ''}
        ${msBadge}
        <div class="order-footer">
          <div class="order-price">₩${(o.total||0).toLocaleString()}</div>
          <div class="order-action">${act}</div>
        </div>
      </div>`;
  }).join('');
}

function filterStatus(status, el) {
  currentFilter = status;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const filtered = status === 'all' ? allOrders : allOrders.filter(o=>o.status===status);
  render(filtered);
}

function openOrder(id) {
  // TODO: 주문 상세 페이지로 이동
  const o = allOrders.find(x=>x.id===id);
  if(!o) return;
  if(o.status === 'waiting') {
    alert(`[${o.id}]\n입금 확인 요청을 보내시겠습니까?\n\n입금액: ₩${o.total.toLocaleString()}`);
  } else if(o.status === 'done') {
    alert(`[${o.id}]\n배포 완료!\n\n배포 리포트 페이지로 이동합니다.`);
  }
}

render(allOrders);
</script>
</body>
</html>
