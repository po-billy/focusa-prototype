<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>국내 배포 — 뉴스247</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif; background: #f5f5f5; max-width: 480px; margin: 0 auto; min-height: 100vh; background: #fff; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 10; }
    .header .back { font-size: 20px; cursor: pointer; color: #333; text-decoration: none; }
    .header h1 { font-size: 17px; font-weight: 600; }
    .header .cart-btn { background: #1a1a2e; color: #fff; border: none; border-radius: 20px; padding: 7px 14px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .cart-btn .badge { background: #e84040; color: #fff; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; display: flex; align-items: center; justify-content: center; }

    /* Tab */
    .tab-bar { display: flex; border-bottom: 1px solid #eee; overflow-x: auto; scrollbar-width: none; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab { padding: 12px 16px; font-size: 14px; color: #999; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; }
    .tab.active { color: #1a1a2e; font-weight: 600; border-bottom-color: #1a1a2e; }

    /* Search */
    .search-box { padding: 12px 16px; }
    .search-box input { width: 100%; padding: 10px 14px 10px 36px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; background: #f8f8f8; outline: none; }
    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 16px; }

    /* Media list */
    .media-list { padding: 0 16px; }
    .media-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
    .media-item:last-child { border-bottom: none; }
    .media-left { display: flex; align-items: center; gap: 12px; }
    .media-check { width: 22px; height: 22px; border: 2px solid #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .media-check.checked { background: #1a1a2e; border-color: #1a1a2e; }
    .media-check.checked::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 700; }
    .media-info .name { font-size: 15px; font-weight: 500; color: #1a1a2e; }
    .media-info .tags { display: flex; gap: 4px; margin-top: 4px; }
    .tag { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
    .tag.naver { background: #e8f5e9; color: #2e7d32; }
    .tag.daum  { background: #e3f2fd; color: #1565c0; }
    .tag.portal { background: #f3e5f5; color: #6a1b9a; }
    .media-right .price { font-size: 15px; font-weight: 700; color: #1a1a2e; text-align: right; }
    .media-right .unit { font-size: 11px; color: #999; }

    /* Bottom sheet */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 40; }
    .overlay.show { display: block; }
    .bottom-sheet { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; border-radius: 20px 20px 0 0; padding: 20px 20px 32px; z-index: 50; transition: transform 0.3s ease; max-height: 80vh; overflow-y: auto; }
    .sheet-handle { width: 40px; height: 4px; background: #e0e0e0; border-radius: 2px; margin: 0 auto 16px; }
    .sheet-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .sheet-close { font-size: 20px; cursor: pointer; color: #999; }
    .sheet-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
    .item-num { width: 26px; height: 26px; background: #1a1a2e; color: #fff; border-radius: 50%; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .item-name { flex: 1; margin-left: 12px; font-size: 14px; font-weight: 500; }
    .item-price { font-size: 14px; font-weight: 700; color: #1a1a2e; }
    .item-remove { background: none; border: none; color: #bbb; font-size: 18px; cursor: pointer; padding: 0 0 0 10px; }
    .sheet-total { display: flex; justify-content: space-between; align-items: center; padding: 16px 0 0; }
    .total-label { font-size: 14px; color: #555; }
    .total-count { font-size: 13px; color: #e84040; font-weight: 600; }
    .total-price { font-size: 20px; font-weight: 800; color: #1a1a2e; }
    .sheet-actions { display: flex; gap: 10px; margin-top: 16px; }
    .btn-back { flex: 1; padding: 14px; border: 1px solid #ddd; border-radius: 10px; background: #fff; font-size: 15px; font-weight: 600; cursor: pointer; color: #333; }
    .btn-order { flex: 2; padding: 14px; border: none; border-radius: 10px; background: #1a1a2e; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }

    /* Sticky footer when items selected */
    .sticky-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; border-top: 1px solid #eee; padding: 12px 16px; display: none; z-index: 30; }
    .sticky-bar.show { display: block; }
    .sticky-inner { display: flex; justify-content: space-between; align-items: center; }
    .sticky-info { font-size: 13px; color: #555; }
    .sticky-info strong { color: #1a1a2e; font-size: 16px; font-weight: 800; }
    .sticky-btn { background: #1a1a2e; color: #fff; border: none; border-radius: 10px; padding: 12px 20px; font-size: 14px; font-weight: 700; cursor: pointer; }

    .section-label { font-size: 12px; color: #999; font-weight: 600; padding: 12px 16px 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  </style>
</head>
<body>

<div class="header">
  <a href="dashboard.html" class="back">←</a>
  <h1>국내 배포</h1>
  <button class="cart-btn" onclick="toggleSheet()">
    선택 확인 <span class="badge" id="badge">0</span>
  </button>
</div>

<div class="tab-bar">
  <div class="tab active" onclick="filterCat('all',this)">전체</div>
  <div class="tab" onclick="filterCat('portal',this)">포털 연동</div>
  <div class="tab" onclick="filterCat('naver',this)">네이버</div>
  <div class="tab" onclick="filterCat('daum',this)">다음</div>
  <div class="tab" onclick="filterCat('economy',this)">경제</div>
  <div class="tab" onclick="filterCat('tech',this)">IT·테크</div>
  <div class="tab" onclick="filterCat('lifestyle',this)">라이프</div>
</div>

<div class="search-box">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="언론사 검색" oninput="searchMedia(this.value)" />
  </div>
</div>

<div class="section-label">포털 연동 언론사</div>
<div class="media-list" id="mediaList"></div>

<div class="sticky-bar" id="stickyBar">
  <div class="sticky-inner">
    <div class="sticky-info">
      <span id="stickyCount">0</span>개 선택 &nbsp;|&nbsp; <strong id="stickyPrice">₩0</strong>
    </div>
    <button class="sticky-btn" onclick="toggleSheet()">선택 확인 →</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="toggleSheet()"></div>
<div class="bottom-sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">
    선택한 매체 확인
    <span class="sheet-close" onclick="toggleSheet()">✕</span>
  </div>
  <div id="sheetItems"></div>
  <div class="sheet-total">
    <div>
      <div class="total-label">합계</div>
      <div class="total-count" id="sheetCount">0개 매체</div>
    </div>
    <div class="total-price" id="sheetTotal">₩0</div>
  </div>
  <div class="sheet-actions">
    <button class="btn-back" onclick="toggleSheet()">돌아가기</button>
    <button class="btn-order" onclick="goToPayment()">📋 제보하기</button>
  </div>
</div>

<script>
const MEDIA_DATA = [
  { id:1, name:'뉴스와이어',  tags:['naver','daum'], price:89000,  cat:'portal' },
  { id:2, name:'뉴스웨이',   tags:['naver','daum'], price:130000, cat:'portal' },
  { id:3, name:'라이브뉴스', tags:['naver'],         price:130000, cat:'portal' },
  { id:4, name:'공감신문',   tags:['portal'],        price:68000,  cat:'portal' },
  { id:5, name:'팜뉴스',     tags:['naver','daum'], price:140000, cat:'portal' },
  { id:6, name:'바이오타임즈',tags:['naver'],        price:140000, cat:'tech'   },
  { id:7, name:'골프타임즈', tags:['daum'],          price:130000, cat:'lifestyle'},
  { id:8, name:'이코노미뷰', tags:['portal'],        price:95000,  cat:'economy'},
  { id:9, name:'테크월드',   tags:['naver','daum'], price:110000, cat:'tech'   },
  { id:10,name:'헬스조선',   tags:['portal'],        price:150000, cat:'lifestyle'},
];

let selected = {};
let currentCat = 'all';
let searchQuery = '';

function fmt(n){ return '₩'+n.toLocaleString(); }

function renderList(){
  const list = document.getElementById('mediaList');
  let data = MEDIA_DATA.filter(m => {
    const catOk = currentCat==='all' || m.cat===currentCat || m.tags.includes(currentCat);
    const searchOk = m.name.includes(searchQuery);
    return catOk && searchOk;
  });
  list.innerHTML = data.map(m => `
    <div class="media-item" onclick="toggle(${m.id})">
      <div class="media-left">
        <div class="media-check ${selected[m.id]?'checked':''}" id="chk${m.id}"></div>
        <div class="media-info">
          <div class="name">${m.name}</div>
          <div class="tags">${m.tags.map(t=>`<span class="tag ${t}">${t==='naver'?'네이버':t==='daum'?'다음':'포털'}</span>`).join('')}</div>
        </div>
      </div>
      <div class="media-right">
        <div class="price">${fmt(m.price)}</div>
        <div class="unit">1회</div>
      </div>
    </div>
  `).join('');
}

function toggle(id){
  if(selected[id]) delete selected[id];
  else { const m=MEDIA_DATA.find(x=>x.id===id); selected[id]=m; }
  updateUI();
  renderList();
}

function filterCat(cat, el){
  currentCat = cat;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function searchMedia(q){
  searchQuery = q;
  renderList();
}

function updateUI(){
  const items = Object.values(selected);
  const total = items.reduce((s,m)=>s+m.price,0);
  const count = items.length;
  document.getElementById('badge').textContent = count;
  document.getElementById('stickyCount').textContent = count;
  document.getElementById('stickyPrice').textContent = fmt(total);
  const bar = document.getElementById('stickyBar');
  bar.classList.toggle('show', count>0);
  // sheet
  document.getElementById('sheetCount').textContent = count+'개 매체';
  document.getElementById('sheetTotal').textContent = fmt(total);
  document.getElementById('sheetItems').innerHTML = items.map((m,i)=>`
    <div class="sheet-item">
      <div class="item-num">${i+1}</div>
      <div class="item-name">${m.name}</div>
      <div class="item-price">${fmt(m.price)}</div>
      <button class="item-remove" onclick="toggle(${m.id});updateSheet()">✕</button>
    </div>
  `).join('');
}

function updateSheet(){ updateUI(); }

function toggleSheet(){
  if(Object.keys(selected).length===0) return;
  document.getElementById('overlay').classList.toggle('show');
  document.getElementById('sheet').classList.toggle('show');
  updateUI();
}

function goToPayment(){
  sessionStorage.setItem('orderType','domestic');
  sessionStorage.setItem('orderItems', JSON.stringify(Object.values(selected)));
  window.location.href='manuscript.html';
}

renderList();
</script>
</body>
</html>
