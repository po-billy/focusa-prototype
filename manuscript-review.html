<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>원고 확인 — PressOnn</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #0f172a; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif;
      background: #f5f5f5; max-width: 480px; margin: 0 auto;
      min-height: 100vh; padding-bottom: 100px;
    }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; background: #fff; border-bottom: 1px solid #f0f0f0;
      position: sticky; top: 0; z-index: 20;
    }
    .back-btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; cursor: pointer; color: #222;
    }
    .back-btn svg { width: 22px; height: 22px; }
    .header h1 { font-size: 16px; font-weight: 700; color: #111; }
    .header .space { width: 32px; }

    /* ── Status banner ── */
    .status-banner {
      display: flex; gap: 10px; align-items: flex-start;
      margin: 12px 16px 0; padding: 13px 14px;
      border-radius: 12px; font-size: 13px; line-height: 1.55;
    }
    .status-banner.warning { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
    .status-banner.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .banner-icon { font-size: 17px; flex-shrink: 0; margin-top: 1px; }

    /* ── AI generating ── */
    .generating-card {
      background: #fff; border-radius: 16px; margin: 12px 16px 0;
      padding: 44px 20px; text-align: center; display: none;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #f0f0f0; border-top-color: rgb(49, 130, 246);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .gen-title { font-size: 16px; font-weight: 700; color: #111; margin-bottom: 8px; }
    .gen-sub { font-size: 13px; color: #999; line-height: 1.5; }

    /* ── Edit card ── */
    .ms-card { background: #fff; border-radius: 16px; margin: 12px 16px 0; padding: 20px; }
    .ms-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; }
    .ms-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
    }
    .ms-badge.ai     { background: #f3e8ff; color: #7c3aed; }
    .ms-badge.direct { background: #e0f2fe; color: #0369a1; }

    .edit-field { margin-bottom: 16px; }
    .edit-label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; font-weight: 600; color: #555; margin-bottom: 8px;
    }
    .char-count { font-size: 12px; color: #bbb; font-weight: 400; }

    input[type=text], textarea {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #e8e8e8; border-radius: 10px;
      font-size: 14px; font-family: inherit; color: #111;
      background: #fff; outline: none; resize: none;
      transition: border-color 0.15s; -webkit-appearance: none;
      line-height: 1.65;
    }
    input[type=text]::placeholder, textarea::placeholder { color: #ccc; }
    input[type=text]:focus, textarea:focus { border-color: rgb(49, 130, 246); }
    textarea { min-height: 260px; }

    .edit-hint { font-size: 12px; color: #bbb; margin-top: 6px; }

    /* ── Confirmed overlay on card ── */
    .ms-card.confirmed input,
    .ms-card.confirmed textarea {
      background: #f8f8f8; color: #999; pointer-events: none;
    }

    /* ── History ── */
    .history-card { background: #fff; border-radius: 14px; margin: 10px 16px 0; padding: 18px; }
    .history-title { font-size: 12px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .history-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
    .history-item:last-child { border-bottom: none; }
    .h-dot { width: 8px; height: 8px; border-radius: 50%; background: rgb(49, 130, 246); flex-shrink: 0; margin-top: 5px; }
    .h-label { font-size: 13px; font-weight: 600; color: #111; }
    .h-date  { font-size: 12px; color: #bbb; margin-top: 2px; }

    /* ── CTA ── */
    .cta-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; background: #fff;
      padding: 12px 20px 20px; border-top: 1px solid #f0f0f0; z-index: 20;
    }
    .cta-btn {
      width: 100%; padding: 16px; background: rgb(49, 130, 246); color: #fff;
      border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .cta-btn:disabled { background: #e0e0e0; color: #bbb; cursor: not-allowed; }
    .cta-btn.confirmed-state { background: #059669; cursor: default; }
  </style>
</head>
<body>

<div class="header">
  <a class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </a>
  <h1>원고 확인·수정</h1>
  <div class="space"></div>
</div>

<div class="status-banner warning" id="statusBanner">
  <div class="banner-icon">✏️</div>
  <div>내용을 자유롭게 수정한 후 <strong>원고 확정</strong>을 눌러주세요.<br>확정 후에는 수정이 불가합니다.</div>
</div>

<!-- AI generating -->
<div class="generating-card" id="generatingCard">
  <div class="spinner"></div>
  <div class="gen-title">AI 원고 생성 중...</div>
  <div class="gen-sub">입금 확인 후 자동으로 원고가 생성됩니다.<br>완료되면 이 페이지에서 바로 수정할 수 있습니다.</div>
</div>

<!-- Edit card -->
<div class="ms-card" id="msCard">
  <div class="ms-card-header">
    <div class="ms-badge" id="msBadge">📝 직접 작성</div>
  </div>

  <div class="edit-field">
    <div class="edit-label">
      <span>제목</span>
      <span class="char-count"><span id="titleLen">0</span>자</span>
    </div>
    <input type="text" id="editTitle" placeholder="제목을 입력하세요"
      oninput="document.getElementById('titleLen').textContent=this.value.length" />
  </div>

  <div class="edit-field">
    <div class="edit-label">
      <span>본문</span>
      <span class="char-count"><span id="bodyLen">0</span>자</span>
    </div>
    <textarea id="editBody" placeholder="본문을 입력하세요"
      oninput="document.getElementById('bodyLen').textContent=this.value.length"></textarea>
    <div class="edit-hint">수정이 필요한 부분을 직접 편집하세요</div>
  </div>
</div>

<div class="history-card">
  <div class="history-title">처리 이력</div>
  <div id="historyList"></div>
</div>

<div class="cta-bar">
  <button class="cta-btn" id="ctaBtn" onclick="confirmManuscript()">원고 확정 →</button>
</div>

<script>
const orderId = new URLSearchParams(location.search).get('order')
  || sessionStorage.getItem('lastOrderId') || '';
const orders  = JSON.parse(localStorage.getItem('focusa_orders') || '[]');
const order   = orders.find(o => o.id === orderId) || orders[0] || {};
const ms      = order.manuscript || {};
let confirmed = order.status === 'confirmed';

function init() {
  const isAi = ms.mode === 'ai';
  const badge = document.getElementById('msBadge');
  badge.textContent = isAi ? '✨ AI 원고 작성' : '📝 직접 작성';
  badge.className   = 'ms-badge ' + (isAi ? 'ai' : 'direct');

  if (isAi && !ms.generatedTitle) {
    document.getElementById('generatingCard').style.display = 'block';
    document.getElementById('msCard').style.display = 'none';
    document.getElementById('ctaBtn').disabled = true;

    setTimeout(() => {
      ms.generatedTitle = (ms.brand || '회사명') + ', ' + (ms.topic || '주제') + ' 공식 발표';
      ms.generatedBody  =
        (ms.brand || '회사명') + '는 ' + (ms.topic || '주제') + '을 공식 발표했다.\n\n' +
        (ms.company || '') + '\n\n' +
        (ms.core || '') + '\n\n' +
        (ms.brand || '회사명') + ' 관계자는 "이번 발표를 통해 고객들에게 더 나은 가치를 제공할 수 있게 되어 기쁘다"며 ' +
        '"앞으로도 지속적인 혁신을 통해 시장을 선도해 나가겠다"고 밝혔다.';
      saveMs();
      document.getElementById('generatingCard').style.display = 'none';
      document.getElementById('msCard').style.display = 'block';
      document.getElementById('ctaBtn').disabled = false;
      populateFields();
      addHistory('✨ AI 원고 생성 완료');
    }, 2200);
    return;
  }

  populateFields();
}

function populateFields() {
  const title = ms.generatedTitle || ms.title || '';
  const body  = ms.generatedBody  || ms.body  || '';
  document.getElementById('editTitle').value = title;
  document.getElementById('editBody').value  = body;
  document.getElementById('titleLen').textContent = title.length;
  document.getElementById('bodyLen').textContent  = body.length;

  if (confirmed) setConfirmedState();
}

function confirmManuscript() {
  const title = document.getElementById('editTitle').value.trim();
  const body  = document.getElementById('editBody').value.trim();
  if (!title) { alert('제목을 입력해주세요.'); return; }
  if (!body)  { alert('본문을 입력해주세요.'); return; }
  if (!confirm('원고를 확정하시겠습니까?\n확정 후에는 수정이 불가합니다.')) return;

  ms.generatedTitle = title;
  ms.generatedBody  = body;
  ms.title          = title;
  ms.body           = body;
  saveMs();
  updateOrderStatus('confirmed');
  addHistory('✅ 원고 확정');
  confirmed = true;
  setConfirmedState();
}

function setConfirmedState() {
  document.getElementById('statusBanner').className = 'status-banner success';
  document.getElementById('statusBanner').innerHTML =
    '<div class="banner-icon">✅</div><div><strong>원고가 확정되었습니다.</strong><br>배포팀에서 검토 후 배포를 진행합니다.</div>';
  document.getElementById('msCard').classList.add('confirmed');
  const btn = document.getElementById('ctaBtn');
  btn.textContent = '확정 완료';
  btn.disabled = true;
  btn.classList.add('confirmed-state');
}

function addHistory(label) {
  const list = document.getElementById('historyList');
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `
    <div class="h-dot"></div>
    <div>
      <div class="h-label">${label}</div>
      <div class="h-date">${new Date().toLocaleString('ko-KR')}</div>
    </div>`;
  list.insertBefore(item, list.firstChild);
}

function saveMs() {
  const all = JSON.parse(localStorage.getItem('focusa_orders') || '[]');
  const idx = all.findIndex(o => o.id === (orderId || order.id));
  if (idx !== -1) { all[idx].manuscript = ms; localStorage.setItem('focusa_orders', JSON.stringify(all)); }
}

function updateOrderStatus(status) {
  const all = JSON.parse(localStorage.getItem('focusa_orders') || '[]');
  const idx = all.findIndex(o => o.id === (orderId || order.id));
  if (idx !== -1) { all[idx].status = status; localStorage.setItem('focusa_orders', JSON.stringify(all)); }
}

// Load history
(order.history || []).forEach(e => addHistory(e.label));
if (!(order.history || []).length) addHistory('📋 주문 접수');

init();
</script>
</body>
</html>
